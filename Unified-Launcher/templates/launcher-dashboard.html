{% extends "base.html" %}
{% block title %}Launcher{% endblock %}
{% block content %}

<section class="hero">
  <p class="eyebrow">Capriccio</p>
  <h1>Service launcher.</h1>
</section>

<ul class="service-list">
  {% for svc in services %}
    <li class="{{ 'is-active' if svc.status == 'active' else 'is-inactive' }}">
      <div class="service-top">
        <span class="status-dot"></span>
        <span class="service-name">{{ svc.name }}</span>
        <span class="service-state">{{ svc.status }}</span>
      </div>

      <div class="service-actions">
        <form method="POST" action="{{ url_for('service_action', systemd_name=svc.systemd, action='start') }}">
          <button class="btn-ghost" type="submit" {{ 'disabled' if svc.status == 'active' }}>Start</button>
        </form>
        <form method="POST" action="{{ url_for('service_action', systemd_name=svc.systemd, action='restart') }}">
          <button class="btn-ghost" type="submit">Restart</button>
        </form>
        <form method="POST" action="{{ url_for('service_action', systemd_name=svc.systemd, action='stop') }}">
          <button class="btn-ghost btn-danger" type="submit" {{ 'disabled' if svc.status != 'active' }}>Stop</button>
        </form>
        <a class="btn-primary-link {{ 'is-disabled' if svc.status != 'active' }}" href="{{ svc.public_url }}" target="_blank">Open →</a>
      </div>
    </li>
  {% endfor %}
</ul>

{% endblock %}
